<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowie🎧</title>
  <link rel="icon" href="images/flowie-logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
</head>
<body>

  <header>
    <div class="header-container">
      <h1 class="logo">Flowie🎧</h1>

      <nav class="nav-desktop" id="mobileNav">
        <a href="#">Features</a>
        <a href="#">About</a>
        <a href="#">Get Started</a>
      </nav>

      <div class="menu-icon" id="menuToggle">☰</div>
    </div>
    </header>

    <main>
      <div class="swiper">
        <div class="swiper-wrapper">
          <section class="card swiper-slide" id="card1">
            <img src="images/timer.jpg" alt="Focus timer">
            <h2>Focus Timer</h2>
            <p id="text1">Stay focused!</p>
            <button class="button" id="btn1">Start Focusing</button>
          </section>

          <section class="card swiper-slide" id="card2">
            <img src="images/planner.jpg" alt="Task planner">
            <h2>Task Planner</h2>
            <p id="text2">Organize your tasks!</p>
            <button class="button" id="btn2">Plan Tasks</button>
          </section>

          <section class="card swiper-slide" id="card3">
            <img src="images/insights.jpg" alt="Insight tracker">
            <h2>Insight Tracker</h2>
            <p id="text3">Track your productivity!</p>
            <button class="button" id="btn3">View Insights</button>
          </section>
        </div>

        <div class="swiper-pagination"></div>

        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
