<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowie🎧</title>
  <link rel="icon" href="images/flowie-logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-contianer">
      <h1 class="logo">Flowie🎧</h1>

      <nav class="nav-desktop">
        <a href="#">Features</a>
        <a href="#">About</a>
        <a href="#">Get Started</a>
      </nav>

      <div class="menu-icon">☰</div>
    </div>
    </header>

    <main>
      <section class="card">
        <img src="images/timer.jpg">
        <h2>Focus Timer</h2>
        <p>Stay focused!</p>
        <button class="button">Start Focusing</button>
      </section>

      <section class="card">
        <img src="images/planner.jpg">
        <h2>Task Planner</h2>
        <p>Organize your tasks!</p>
        <button class="button">Plan Tasks</button>
      </section>

      <section class="card">
        <img src="images/insights.jpg">
        <h2>Insight Tracker</h2>
        <p>Track your productivity!</p>
        <button class="button">View Insights</button>
      </section>
    </main>
    <script src="script.js"></script>

</html>
