<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowie</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-container">
      <h1 class="logo">Flowie</h1>

      <!-- Desktop nav -->
      <nav class="nav-desktop">
        <a href="#">Features</a>
        <a href="#">About</a>
        <a href="#">Get Started</a>
      </nav>

      <!-- Mobile menu icon -->
      <div class="menu-icon">☰</div>
    </div>
  </header>

  <!-- Main content -->
  <main>

    <!-- Section 1 -->
    <section class="card">
      <img src="https://via.placeholder.com/400x200" alt="Focus Timer">
      <h2>Focus Timer</h2>
      <p>Stay focused with simple, distraction-free study sessions.</p>
      <button>Start Focusing</button>
    </section>

    <!-- Section 2 -->
    <section class="card">
      <img src="https://via.placeholder.com/400x200" alt="Task Planner">
      <h2>Task Planner</h2>
      <p>Organize your tasks clearly and plan your day with ease.</p>
      <button>Plan Tasks</button>
    </section>

    <!-- Section 3 -->
    <section class="card">
      <img src="https://via.placeholder.com/400x200" alt="Insight Tracker">
      <h2>Insight Tracker</h2>
      <p>Track your productivity and build better study habits.</p>
      <button>View Insights</button>
    </section>

  </main>

</body>
</html>
